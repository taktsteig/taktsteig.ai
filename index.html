<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>taktsteig</title>
  <style>
    /* === Basis-Layout === */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #0F1B2D;
      color: #E0E0E0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* === Logo-Container === */
    .logo-container {
      position: relative;
      display: inline-block;
      line-height: 1;
    }

    /* === Haupttext: taktstei + spezielles g === */
    .logo {
      font-size: 3.6rem;
      font-weight: 500;
      letter-spacing: -0.8px;
      color: #0F1B2D;
      margin: 0;
    }

    /* Dark Mode - Anpassung */
    @media (prefers-color-scheme: dark) {
      .logo { color: #E0E0E0; }
    }

    /* === Der "rising-g" mit feinem Aufstieg === */
    .rising-g {
      position: relative;
      display: inline-block;
      padding-right: 6px; /* Platz für den Strich */
    }

    .rising-g::after {
      content: '';
      position: absolute;
      width: 7px;
      height: 1.8px;
      background: #E91E63; /* Rising Red */
      top: 53%;             /* Aligned mit dem Auslauf des 'g' */
      left: 100%;           /* Direkt am Ende des Buchstabens */
      transform: translateY(-50%) rotate(22deg);
      transform-origin: left;
      border-radius: 0.5px;
    }

    /* === Aussprache (Phonetic) === */
    .phonetic {
      font-size: 1.1rem;
      font-weight: 400;
      font-style: italic;
      color: #888;
      margin: 0.4rem 0 0;
      display: block;
    }

    /* === Untertitel / Tagline === */
    .tagline {
      font-size: 1.2rem;
      color: #B0B0B0;
      max-width: 500px;
      margin-top: 1.5rem;
      line-height: 1.5;
    }

    /* === Mobile Optimierung === */
    @media (max-width: 480px) {
      .logo { font-size: 2.6rem; }
      .phonetic { font-size: 0.95rem; }
      .tagline { font-size: 1.1rem; }
      .rising-g { padding-right: 5px; }
      .rising-g::after {
        width: 6px;
        height: 1.6px;
      }
    }
  </style>
</head>
<body>

  <!-- Logo mit integriertem Steig -->
  <div class="logo-container">
    <h1 class="logo">taktstei<span class="rising-g">g</span></h1>
    <span class="phonetic">/ˈtaktʃˌʃtaɪ̯k/</span>
  </div>

  <!-- Botschaft -->
  <p class="tagline">where rhythm builds impact</p>

</body>
</html>
